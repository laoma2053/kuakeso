# ============================================
# 夸克搜 - Docker Compose 部署配置
# 使用方法: docker compose up -d --build
# ============================================

services:
  # -------- PostgreSQL 数据库 --------
  postgres:
    image: postgres:16-alpine
    container_name: wangpanso-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wangpanso
      POSTGRES_USER: wangpanso
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      TZ: Asia/Shanghai                          # 容器时区
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wangpanso"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------- Redis 缓存 & 队列 --------
  redis:
    image: redis:7-alpine
    container_name: wangpanso-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      TZ: Asia/Shanghai                          # 容器时区
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------- Next.js Web 应用 --------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wangpanso-web
    restart: unless-stopped
    ports:
      - "${PORT:-6060}:3000"                     # 宿主机端口:容器内端口（容器内固定3000）
    environment:
      TZ: Asia/Shanghai                          # 容器时区
      DATABASE_URL: postgresql://wangpanso:${DB_PASSWORD:-changeme123}@postgres:5432/wangpanso
      REDIS_URL: redis://redis:6379
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme}       # 管理后台令牌
      PANSOU_API_URL: ${PANSOU_API_URL:-http://localhost:8888}  # PanSou搜索API地址
      PANSOU_API_TOKEN: ${PANSOU_API_TOKEN:-}
      SAVE_DIR: ${SAVE_DIR:-/来自搜索站}           # 夸克网盘转存目录
      SHARE_EXPIRE_MINUTES: ${SHARE_EXPIRE_MINUTES:-15}  # 资源过期清理周期（分钟）
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:6060}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-夸克搜}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------- 清理 Worker（定时清理过期资源）--------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: wangpanso-worker
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai                          # 容器时区
      DATABASE_URL: postgresql://wangpanso:${DB_PASSWORD:-changeme123}@postgres:5432/wangpanso
      REDIS_URL: redis://redis:6379
      SAVE_DIR: ${SAVE_DIR:-/来自搜索站}
      SHARE_EXPIRE_MINUTES: ${SHARE_EXPIRE_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:                                 # PostgreSQL 数据持久化
  redis_data:                                    # Redis 数据持久化
